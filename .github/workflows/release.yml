name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────
  # Build matrix: one job per platform / arch
  # ─────────────────────────────────────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Windows x64 ──
          - platform: windows-latest
            args: --target x86_64-pc-windows-msvc
            rust-target: x86_64-pc-windows-msvc
            label: windows-x64

          # ── macOS Intel ──
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust-target: x86_64-apple-darwin
            label: macos-x64

          # ── macOS Apple Silicon ──
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust-target: aarch64-apple-darwin
            label: macos-arm64

          # ── Linux x64 ──
          - platform: ubuntu-22.04
            args: --target x86_64-unknown-linux-gnu
            rust-target: x86_64-unknown-linux-gnu
            label: linux-x64

    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── System deps (Linux only) ──
      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      # ── Rust toolchain ──
      - name: Install Rust stable + target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/desktop/src-tauri/target/
          key: ${{ runner.os }}-${{ matrix.rust-target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.rust-target }}-cargo-

      # ── Node / pnpm ──
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # ── Python sidecar ──
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install sidecar dependencies
        working-directory: services/ai
        run: pip install -r requirements.txt --break-system-packages || pip install -r requirements.txt

      # ── Download Ollama binary for this platform ──
      # Ollama changed its distribution format: binaries are now archives.
      # macOS: ollama-darwin.tgz (universal binary ~130 MB, works for both x64 + arm64)
      # Linux: ollama-linux-amd64.tar.zst  (extracts to bin/ollama)
      # Windows: ollama-windows-amd64.zip  (extracts to ollama.exe)
      # We fetch the latest release version dynamically so we never hit a 404.

      - name: Download Ollama binary (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $headers = @{ Authorization = "Bearer ${{ github.token }}" }
          $version = (Invoke-RestMethod -Uri "https://api.github.com/repos/ollama/ollama/releases/latest" -Headers $headers).tag_name.TrimStart('v')
          Write-Host "Downloading Ollama v${version} for Windows"
          $url = "https://github.com/ollama/ollama/releases/download/v${version}/ollama-windows-amd64.zip"
          Invoke-WebRequest -Uri $url -OutFile ollama.zip
          Expand-Archive -Path ollama.zip -DestinationPath ollama-extracted
          New-Item -ItemType Directory -Force -Path "apps\desktop\src-tauri\binaries" | Out-Null
          Copy-Item "ollama-extracted\ollama.exe" "apps\desktop\src-tauri\binaries\ollama-x86_64-pc-windows-msvc.exe"

      # macOS: ollama-darwin.tgz is a universal binary — one download covers both x64 and arm64.
      - name: Download Ollama binary (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          VERSION=$(curl -fsSL -H "Authorization: Bearer ${{ github.token }}" \
            https://api.github.com/repos/ollama/ollama/releases/latest \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'].lstrip('v'))")
          echo "Downloading Ollama v${VERSION} for macOS (universal)"
          mkdir -p apps/desktop/src-tauri/binaries
          curl -fsSL "https://github.com/ollama/ollama/releases/download/v${VERSION}/ollama-darwin.tgz" \
            | tar -xz
          # The tgz extracts to ./ollama in the current directory
          cp ollama apps/desktop/src-tauri/binaries/ollama-${{ matrix.rust-target }}
          chmod +x apps/desktop/src-tauri/binaries/ollama-${{ matrix.rust-target }}

      - name: Download Ollama binary (Linux x64)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          VERSION=$(curl -fsSL -H "Authorization: Bearer ${{ github.token }}" \
            https://api.github.com/repos/ollama/ollama/releases/latest \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'].lstrip('v'))")
          echo "Downloading Ollama v${VERSION} for Linux"
          sudo apt-get install -y zstd
          mkdir -p /tmp/ollama-extract
          curl -fsSL "https://github.com/ollama/ollama/releases/download/v${VERSION}/ollama-linux-amd64.tar.zst" \
            | tar -I zstd -xf - -C /tmp/ollama-extract
          mkdir -p apps/desktop/src-tauri/binaries
          # The tar.zst extracts to bin/ollama inside the archive
          cp /tmp/ollama-extract/bin/ollama apps/desktop/src-tauri/binaries/ollama-x86_64-unknown-linux-gnu
          chmod +x apps/desktop/src-tauri/binaries/ollama-x86_64-unknown-linux-gnu

      # ── Build with signing key so Tauri generates .sig files ──
      - name: Build Tauri application
        run: pnpm --filter desktop tauri build ${{ matrix.args }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""

      # ── Collect updater bundles + .sig files into a flat directory ──
      # These are the archives the auto-updater downloads (not the user-facing
      # installers). Tauri generates them automatically when a signing key is set.
      - name: Collect updater artifacts
        shell: bash
        run: |
          mkdir -p updater-artifacts
          BUNDLE_DIR="apps/desktop/src-tauri/target/${{ matrix.rust-target }}/release/bundle"
          for dir in macos nsis msi appimage; do
            if [ -d "$BUNDLE_DIR/$dir" ]; then
              find "$BUNDLE_DIR/$dir" \( \
                -name "*.app.tar.gz"       -o -name "*.app.tar.gz.sig"       \
                -o -name "*.nsis.zip"      -o -name "*.nsis.zip.sig"         \
                -o -name "*.msi.zip"       -o -name "*.msi.zip.sig"          \
                -o -name "*.AppImage.tar.gz" -o -name "*.AppImage.tar.gz.sig" \
              \) -exec cp {} updater-artifacts/ \;
            fi
          done
          echo "=== updater-artifacts ==="
          ls -lh updater-artifacts/ 2>/dev/null || echo "(none found)"

      - name: Upload updater artifacts
        uses: actions/upload-artifact@v4
        with:
          name: updater-${{ matrix.label }}
          path: updater-artifacts/
          if-no-files-found: warn

      # ── Upload installers + updater bundles to GitHub Release ──
      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          name: "LocalMind ${{ github.ref_name }}"
          draft: false
          fail_on_unmatched_files: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') }}
          body: |
            ## LocalMind ${{ github.ref_name }}

            **Privacy-first AI assistant that runs entirely on your machine.**
            No account required. No data leaves your computer.

            ### Install

            | Platform | Download |
            |----------|---------|
            | Windows  | `.msi` or `.exe` below |
            | macOS Intel | `.dmg` (x64) below |
            | macOS Apple Silicon | `.dmg` (arm64) below |
            | Linux | `.AppImage` or `.deb` below |

            See [README](https://github.com/${{ github.repository }}#readme) for setup instructions.
          files: |
            target/${{ matrix.rust-target }}/release/bundle/msi/*.msi
            target/${{ matrix.rust-target }}/release/bundle/nsis/*.exe
            target/${{ matrix.rust-target }}/release/bundle/dmg/*.dmg
            target/${{ matrix.rust-target }}/release/bundle/appimage/*.AppImage
            target/${{ matrix.rust-target }}/release/bundle/deb/*.deb
            updater-artifacts/*.app.tar.gz
            updater-artifacts/*.nsis.zip
            updater-artifacts/*.msi.zip
            updater-artifacts/*.AppImage.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────
  # Post-release: generate SHA256SUMS.txt
  # ─────────────────────────────────────────────
  checksums:
    name: Generate SHA256SUMS
    needs: build
    runs-on: ubuntu-22.04

    steps:
      - name: Download all release assets
        uses: robinraju/release-downloader@v1
        with:
          tag: ${{ github.ref_name }}
          fileName: "*"
          out-file-path: release-assets
          errorOnNoAssetsFound: false

      - name: Generate SHA256SUMS.txt
        run: |
          cd release-assets
          sha256sum * | sort > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload SHA256SUMS.txt to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: release-assets/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────
  # Post-release: generate latest.json for the
  # Tauri auto-updater endpoint
  # ─────────────────────────────────────────────
  publish-updater:
    name: Publish updater manifest
    needs: build
    runs-on: ubuntu-22.04

    steps:
      - name: Download all updater sig artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: updater-*
          merge-multiple: true
          path: sigs

      - name: List collected sig files
        run: ls -lh sigs/ 2>/dev/null || echo "(no sig files found)"

      - name: Generate latest.json
        run: |
          python3 << 'PYEOF'
          import json, os, glob, datetime

          tag = os.environ['GITHUB_REF_NAME']          # e.g. "v0.5.1"
          version = tag.lstrip('v')                    # e.g. "0.5.1"
          repo = os.environ['GITHUB_REPOSITORY']
          base_url = f"https://github.com/{repo}/releases/download/{tag}"

          def read_sig(pattern):
              """Find a .sig file matching pattern, return (sig_content, bundle_filename)."""
              files = glob.glob(os.path.join('sigs', pattern))
              if not files:
                  return None, None
              sig_file = sorted(files)[0]
              bundle_name = os.path.basename(sig_file)[:-4]  # strip trailing .sig
              return open(sig_file).read().strip(), bundle_name

          platforms = {}

          # macOS Apple Silicon
          sig, bundle = read_sig('*aarch64*.app.tar.gz.sig')
          if sig:
              platforms['darwin-aarch64'] = {'signature': sig, 'url': f'{base_url}/{bundle}'}

          # macOS Intel
          sig, bundle = read_sig('*x64*.app.tar.gz.sig')
          if sig:
              platforms['darwin-x86_64'] = {'signature': sig, 'url': f'{base_url}/{bundle}'}

          # Windows x64 — prefer NSIS, fall back to MSI
          sig, bundle = read_sig('*.nsis.zip.sig')
          if not sig:
              sig, bundle = read_sig('*.msi.zip.sig')
          if sig:
              platforms['windows-x86_64'] = {'signature': sig, 'url': f'{base_url}/{bundle}'}

          # Linux x64 (AppImage)
          sig, bundle = read_sig('*.AppImage.tar.gz.sig')
          if sig:
              platforms['linux-x86_64'] = {'signature': sig, 'url': f'{base_url}/{bundle}'}

          manifest = {
              'version': version,
              'notes': f'LocalMind {tag}',
              'pub_date': datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ'),
              'platforms': platforms,
          }

          with open('latest.json', 'w') as f:
              json.dump(manifest, f, indent=2)

          print(json.dumps(manifest, indent=2))
          print(f"\nPlatforms covered: {list(platforms.keys())}")
          PYEOF
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Upload latest.json to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
