name: CI – Python

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: ruff lint + import check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: services/ai
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: ruff lint
        working-directory: services/ai
        run: ruff check .

      - name: Verify sidecar entry point imports cleanly
        working-directory: services/ai
        run: python -c "import app.main; import app.api.routes.health"
