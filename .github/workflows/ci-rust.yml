name: CI – Rust

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: cargo check + clippy + test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies (required by Tauri on Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # Tauri's build script checks that externalBin paths exist at compile
      # time. Create empty placeholders so cargo check / clippy pass without
      # needing to download the real ~200 MB Ollama binary.
      - name: Create Ollama binary placeholder
        run: |
          mkdir -p apps/desktop/src-tauri/binaries
          touch apps/desktop/src-tauri/binaries/ollama-x86_64-unknown-linux-gnu

      - name: cargo check (all workspace crates)
        run: cargo check --workspace

      - name: cargo clippy (deny warnings)
        run: cargo clippy --workspace -- -D warnings

      - name: cargo test (workspace unit tests)
        run: cargo test --workspace
